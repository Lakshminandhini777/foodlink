<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD0tlpfw97fCh6FFMmkAdeHA6bykkKFoq0",
  authDomain: "foodlink-b3c3a.firebaseapp.com",
  projectId: "foodlink-b3c3a",
  storageBucket: "foodlink-b3c3a.appspot.com",
  messagingSenderId: "606644876456",
  appId: "1:606644876456:web:2dc20dd2bb15afefe07e9d"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// LOGIN
window.login = function () {
    let role = document.getElementById("role").value;

    document.getElementById("login").classList.add("hidden");

    if(role === "hotel") {
        document.getElementById("hotel").classList.remove("hidden");
    } else {
        document.getElementById("ngo").classList.remove("hidden");
        loadFood();
    }
};

// ADD FOOD
window.addFood = async function () {

    let name = document.getElementById("name").value;
    let quantity = document.getElementById("quantity").value;
    let location = document.getElementById("location").value;
    let expiry = parseFloat(document.getElementById("expiry").value);

    if(!name || !quantity || !location || !expiry){
        alert("Fill all fields!");
        return;
    }

    await addDoc(collection(db, "food"), {
        name,
        quantity,
        location,
        expiry: Date.now() + expiry * 60 * 60 * 1000
    });

    alert("Food Added!");

};

// LOAD FOOD (REAL-TIME)
window.loadFood = function () {

    onSnapshot(collection(db, "food"), (snapshot) => {

        let output = "";
        let total = 0;

        snapshot.forEach((docItem) => {

            let f = docItem.data();
            let diff = f.expiry - Date.now();

            if(diff <= 0){
                deleteDoc(doc(db, "food", docItem.id));
                return;
            }

            total++;

            output += `
            <div class="card">
                <h3>${f.name}</h3>
                <p><b>Quantity:</b> ${f.quantity}</p>
                <p><b>Location:</b> ${f.location}</p>
                <button onclick="acceptFood('${docItem.id}', '${f.location}')">Accept</button>
            </div>`;
        });

        document.getElementById("list").innerHTML = output;
        document.getElementById("total").innerText = total;

    });
};

// ACCEPT FOOD
window.acceptFood = async function(id, location) {

    await deleteDoc(doc(db, "food", id));

    alert("Food Accepted!");

    document.getElementById("map").src =
        "https://maps.google.com/maps?q=" + location + "&output=embed";
};

            </script>
