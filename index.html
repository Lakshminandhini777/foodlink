<!DOCTYPE html>
<html>
<head>
<title>FoodLink</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(to right, #1f4037, #99f2c8);
    color: white;
    text-align: center;
}

.card {
    background: rgba(255,255,255,0.1);
    padding: 20px;
    margin: 20px auto;
    width: 300px;
    border-radius: 12px;
}

input, select, button {
    margin: 10px;
    padding: 10px;
    width: 80%;
    border-radius: 8px;
}

button {
    background: #00c853;
    color: white;
    border: none;
}

.hidden { display: none; }
</style>
</head>

<body>

<h2>🍱 FoodLink</h2>

<!-- LOGIN -->
<div id="login" class="card">
<h3>Login / Register</h3>

<select id="role">
<option value="donor">Donor</option>
<option value="receiver">Receiver</option>
</select>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="register()">Register</button>
<button onclick="login()">Login</button>
</div>

<!-- DONOR -->
<div id="donor" class="hidden">
<div class="card">
<h3>Upload Food</h3>

<input id="name" placeholder="Food Name">
<input id="quantity" placeholder="Quantity">
<input id="location" placeholder="Location">
<input id="expiry" placeholder="Expiry hours">

<button onclick="addFood()">Upload</button>
</div>
</div>

<!-- RECEIVER -->
<div id="receiver" class="hidden">
<div id="list"></div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyD0tlpfw97fCh6FFMmkAdeHA6bykkKFoq0",
  authDomain: "foodlink-b3c3a.firebaseapp.com",
  projectId: "foodlink-b3c3a",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

// REGISTER
function register(){
    let email = document.getElementById("email").value;
    let pass = document.getElementById("password").value;
    let role = document.getElementById("role").value;

    auth.createUserWithEmailAndPassword(email, pass)
    .then(user => {
        db.collection("users").doc(user.user.uid).set({role});
        alert("Registered!");
    })
    .catch(err => alert(err.message));
}

// LOGIN
function login(){
    let email = document.getElementById("email").value;
    let pass = document.getElementById("password").value;

    auth.signInWithEmailAndPassword(email, pass)
    .catch(err => alert(err.message));
}

// CHECK USER
auth.onAuthStateChanged(async user => {
    if(user){
        document.getElementById("login").style.display = "none";

        let doc = await db.collection("users").doc(user.uid).get();
        let role = doc.data().role;

        if(role === "donor"){
            document.getElementById("donor").classList.remove("hidden");
        } else {
            document.getElementById("receiver").classList.remove("hidden");
            loadFood();
        }
    }
});

// ADD FOOD
function addFood(){
    let name = document.getElementById("name").value;
    let quantity = document.getElementById("quantity").value;
    let location = document.getElementById("location").value;
    let expiry = parseFloat(document.getElementById("expiry").value);

    db.collection("food").add({
        name, quantity, location,
        expiry: Date.now() + expiry * 3600000
    });

    alert("Food Added!");
}

// LOAD FOOD
function loadFood(){
    db.collection("food").onSnapshot(snapshot => {
        let output = "";

        snapshot.forEach(doc => {
            let f = doc.data();

            if(f.expiry < Date.now()){
                db.collection("food").doc(doc.id).delete();
                return;
            }

            output += `
            <div class="card">
            <h3>${f.name}</h3>
            <p>${f.quantity}</p>
            <p>${f.location}</p>
            <button onclick="accept('${doc.id}')">Accept</button>
            </div>`;
        });

        document.getElementById("list").innerHTML = output;
    });
}

// ACCEPT
function accept(id){
    db.collection("food").doc(id).delete();
}
</script>

</body>
</html>
