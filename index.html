<!DOCTYPE html>
<html>
<head>
<title>FoodLink</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(to right, #d4fc79, #96e6a1);
    text-align: center;
}
.card {
    background: white;
    padding: 20px;
    margin: 20px auto;
    width: 300px;
    border-radius: 10px;
}
input, button {
    margin: 10px;
    padding: 10px;
    width: 80%;
}
</style>

</head>

<body>

<h2>🍱 FoodLink</h2>

<div class="card">
<input id="name" placeholder="Food Name">
<input id="quantity" placeholder="Quantity">
<input id="location" placeholder="Location">
<input id="expiry" placeholder="Expiry hours">
<button onclick="addFood()">Upload</button>
</div>

<div id="list"></div>

<!-- ✅ Firebase CDN (IMPORTANT) -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyD0tlpfw97fCh6FFMmkAdeHA6bykkKFoq0",
  authDomain: "foodlink-b3c3a.firebaseapp.com",
  projectId: "foodlink-b3c3a",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function addFood() {
    let name = document.getElementById("name").value;
    let quantity = document.getElementById("quantity").value;
    let location = document.getElementById("location").value;
    let expiry = parseFloat(document.getElementById("expiry").value);

    if(!name || !quantity || !location || !expiry){
        alert("Fill all fields!");
        return;
    }

    db.collection("food").add({
        name,
        quantity,
        location,
        expiry: Date.now() + expiry * 3600000
    });

    alert("Food Added!");
}

function loadFood() {
    db.collection("food").onSnapshot((snapshot) => {
        let output = "";
        snapshot.forEach((doc) => {
            let f = doc.data();

            if(f.expiry < Date.now()){
                db.collection("food").doc(doc.id).delete();
                return;
            }

            output += `
            <div class="card">
                <h3>${f.name}</h3>
                <p>${f.quantity}</p>
                <p>${f.location}</p>
            </div>`;
        });

        document.getElementById("list").innerHTML = output;
    });
}

loadFood();
</script>

</body>
</html>
