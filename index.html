<!DOCTYPE html>
<html>
<head>
<title>🍱 FoodLink Smart System</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(to right, #d4fc79, #96e6a1);
    text-align: center;
    margin: 0;
}

.header {
    background: green;
    color: white;
    padding: 15px;
    font-size: 22px;
}

.card {
    background: white;
    padding: 20px;
    margin: 20px auto;
    width: 320px;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

input, select {
    display: block;
    margin: 12px auto;
    padding: 12px;
    width: 260px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    padding: 10px 20px;
    margin-top: 10px;
    background: green;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}
button:hover { background: darkgreen; }

.hidden { display: none; }

.stats {
    display: flex;
    justify-content: center;
    gap: 15px;
}

.stat-box {
    background: white;
    padding: 10px;
    border-radius: 10px;
    width: 120px;
}
</style>
</head>

<body>

<div class="header">🍱 FoodLink Smart System</div>

<!-- LOGIN -->
<div id="login" class="card">
<h3>Login</h3>

<select id="role">
    <option value="hotel">Donor</option>
    <option value="ngo">Receiver</option>
</select>

<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Login</button>
</div>

<!-- DONOR -->
<div id="hotel" class="hidden">
<div class="card">
<h3>Upload Food</h3>

<input id="name" placeholder="Food Name">
<input id="quantity" placeholder="Quantity">
<input id="location" placeholder="Location">
<input id="expiry" placeholder="Expiry (hours)">

<button onclick="addFood()">Upload</button>
</div>
</div>

<!-- RECEIVER -->
<div id="ngo" class="hidden">

<div class="card">
<h3>Dashboard</h3>
<div class="stats">
    <div class="stat-box">
        <h4 id="total">0</h4>
        <p>Total</p>
    </div>
</div>
</div>

<div id="list"></div>

<div class="card">
<h3>Map View</h3>
<iframe id="map" width="100%" height="250"></iframe>
</div>

</div>

<!-- 🔥 FIREBASE SCRIPT -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD0tlpfw97fCh6FFMmkAdeHA6bykkKFoq0",
  authDomain: "foodlink-b3c3a.firebaseapp.com",
  projectId: "foodlink-b3c3a",
  storageBucket: "foodlink-b3c3a.appspot.com",
  messagingSenderId: "606644876456",
  appId: "1:606644876456:web:2dc20dd2bb15afefe07e9d"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// LOGIN
window.login = function () {
    let role = document.getElementById("role").value;

    document.getElementById("login").classList.add("hidden");

    if(role === "hotel") {
        document.getElementById("hotel").classList.remove("hidden");
    } else {
        document.getElementById("ngo").classList.remove("hidden");
        loadFood();
    }
};

// ADD FOOD
window.addFood = async function () {

    let name = document.getElementById("name").value;
    let quantity = document.getElementById("quantity").value;
    let location = document.getElementById("location").value;
    let expiry = parseFloat(document.getElementById("expiry").value);

    if(!name || !quantity || !location || !expiry){
        alert("Fill all fields!");
        return;
    }

    await addDoc(collection(db, "food"), {
        name,
        quantity,
        location,
        expiry: Date.now() + expiry * 60 * 60 * 1000
    });

    alert("Food Added!");
};

// LOAD FOOD (REAL-TIME)
function loadFood() {

    onSnapshot(collection(db, "food"), (snapshot) => {

        let output = "";
        let total = 0;

        snapshot.forEach((docItem) => {

            let f = docItem.data();
            let diff = f.expiry - Date.now();

            if(diff <= 0){
                deleteDoc(doc(db, "food", docItem.id));
                return;
            }

            total++;

            output += `
            <div class="card">
                <h3>${f.name}</h3>
                <p><b>Quantity:</b> ${f.quantity}</p>
                <p><b>Location:</b> ${f.location}</p>
                <button onclick="acceptFood('${docItem.id}', '${f.location}')">Accept</button>
            </div>`;
        });

        document.getElementById("list").innerHTML = output;
        document.getElementById("total").innerText = total;

    });
}

// ACCEPT FOOD
window.acceptFood = async function(id, location) {

    await deleteDoc(doc(db, "food", id));

    alert("Food Accepted!");

    document.getElementById("map").src =
        "https://maps.google.com/maps?q=" + location + "&output=embed";
};

</script>

</body>
</html>
